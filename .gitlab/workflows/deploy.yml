name: NMH-5 Production CI/CD Pipeline

on:
  push:
    branches:
      - main  # Triggers the pipeline automatically when you push code to the main branch

jobs:
  validate-and-lint:
    name: 1. Code Validation & Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'
          cache: 'pip'

      - name: Install Validation Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Syntax & Lint Checking (Flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warning logs for code formatting standards
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  deploy-to-ubuntu-vm:
    name: 2. Headless VM Server Deployment
    needs: validate-and-lint  # Only runs if the code validation step passes completely
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands on Ubuntu VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Navigate to your production directory
            cd /home/${{ secrets.SERVER_USERNAME }}/nifty-momentum-harvester || exit 1
            
            # 2. Pull the absolute newest code update from GitHub cleanly
            git fetch --all
            git reset --hard origin/main
            
            # 3. Synchronize python runtime virtual packages
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 4. Refresh launcher script executable access permissions
            chmod +x launcher.sh
            
            # 5. If the market is open right now, do a zero-downtime hot reload of the tmux session
            if [ "$(date +%H%M)" -ge "0900" ] && [ "$(date +%H%M)" -le "1540" ] && [ "$(date +%u)" -le 5 ]; then
              echo "⚡ Market hours active. Restarting running strategy instance..."
              ./launcher.sh
            else
              echo "💤 Market closed. Code deployment updated on disk. Crontab will boot code at 9:00 AM."
            fi
            
